# ─── Serveur ─────────────────────────────────────────────────────────────────
server.port=8083

# ─── Base de données MySQL (phpMyAdmin) ──────────────────────────────────────
spring.datasource.url=jdbc:mysql://localhost:3306/mini_bibliotheque?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ─── JPA / Hibernate ─────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ─── Upload fichiers (images couverture) ─────────────────────────────────────
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB

# Dossier de stockage des images (à adapter selon votre OS)
app.upload.dir=uploads

# ─── Firebase ────────────────────────────────────────────────────────────────
# Chemin vers le fichier JSON de compte de service Firebase
# Télécharger depuis : Console Firebase > Paramètres du projet > Comptes de service
app.firebase.service-account=classpath:firebase-service-account.json

# ─── CORS – origines autorisées pour Angular ─────────────────────────────────
app.cors.allowed-origins=http://localhost:4200
